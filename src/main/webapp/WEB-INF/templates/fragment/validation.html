<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="notification">

    <div th:if="${successMessage}" class="alert alert-success" style="padding: 15px; margin-bottom: 20px; color: #155724; background-color: #d4edda; border: 1px solid #c3e6cb; border-radius: 4px;">
        <strong>Thành công!</strong> <span th:text="${successMessage}"></span>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger" style="padding: 15px; margin-bottom: 20px; color: #721c24; background-color: #f8d7da; border: 1px solid #f5c6cb; border-radius: 4px;">
        <strong>Lỗi!</strong> <span th:text="${errorMessage}"></span>
    </div>

    <div th:if="${employee != null and #fields.hasErrors('employee.*')}" class="alert alert-danger" style="padding: 15px; margin-bottom: 20px; color: #721c24; background-color: #f8d7da; border: 1px solid #f5c6cb; border-radius: 4px;">
        <strong>Vui lòng kiểm tra lại dữ liệu:</strong>
        <ul style="margin-top: 5px; margin-bottom: 0; padding-left: 20px;">
            <li th:each="err : ${#fields.errors('employee.*')}" th:text="${err}"></li>
        </ul>
    </div>

</div>

</body>
</html>
