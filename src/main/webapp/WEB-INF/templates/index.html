<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách nhân viên</title>
</head>
<body>

<div th:replace="~{header :: header}"></div>

<div style="width: 80%; margin: 20px auto;">
    <h2>Danh sách nhân viên</h2>

    <form th:action="@{/employee}" method="get" style="margin-bottom: 20px;">
        <input type="text" name="search" placeholder="Tìm kiếm..." />
        <button type="submit">Tìm</button>
    </form>

    <a th:href="@{/employee/add}">+ Thêm mới nhân viên</a>

    <table border="1" style="width: 100%; margin-top: 20px; border-collapse: collapse; text-align: left;">
        <thead>
        <tr>
            <th>ID</th>
            <th>Ảnh</th>
            <th>Tên</th>
            <th>Email</th>
            <th>Hành động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="emp : ${employees}">
            <td th:text="${emp.id}"></td>
            <td>
                <img th:if="${emp.avatar != null}" th:src="@{'/uploads/' + ${emp.avatar}}" width="50" height="50" />
            </td>
            <td th:text="${emp.name}"></td>
            <td th:text="${emp.email}"></td>
            <td>
                <a th:href="@{'/employee/edit/' + ${emp.id}}">Sửa</a> |
                <a th:href="@{'/employee/delete/' + ${emp.id}}" onclick="return confirm('Bạn có chắc chắn xóa?');">Xóa</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<div th:replace="~{footer :: footer}"></div>

</body>
</html>
