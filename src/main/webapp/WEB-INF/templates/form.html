<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thông tin nhân viên</title>
</head>
<body>

<div th:replace="~{header :: header}"></div>

<div style="width: 50%; margin: 20px auto; border: 1px solid #ccc; padding: 20px;">
    <h2>Form Nhân Viên</h2>

    <div th:replace="~{validation :: notification}"></div>

    <form th:action="@{/employee/save}" method="post" th:object="${employee}" enctype="multipart/form-data">

        <input type="hidden" th:field="*{id}" />

        <div style="margin-bottom: 15px;">
            <label>Tên nhân viên:</label><br/>
            <input type="text" th:field="*{name}" style="width: 100%; padding: 8px;"/>
        </div>

        <div style="margin-bottom: 15px;">
            <label>Email:</label><br/>
            <input type="email" th:field="*{email}" style="width: 100%; padding: 8px;"/>
        </div>

        <div style="margin-bottom: 15px;">
            <label>Ảnh đại diện (Avatar):</label><br/>
            <input type="file" name="file" />

            <div th:if="${employee.avatar != null}">
                <p>Ảnh hiện tại:</p>
                <img th:src="@{'/uploads/' + ${employee.avatar}}" width="100"/>
            </div>
        </div>

        <button type="submit" style="padding: 10px 20px; background: blue; color: white; cursor: pointer;">
            Lưu Thông Tin
        </button>
        <a th:href="@{/employee}">Hủy</a>
    </form>
</div>

<div th:replace="~{footer :: footer}"></div>

</body>
</html>
