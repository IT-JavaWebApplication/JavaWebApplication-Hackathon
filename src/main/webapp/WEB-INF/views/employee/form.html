<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="container" style="width: 50%;">
    <h2 style="text-align: center;" th:text="${employee.id == null ? 'ADD EMPLOYEE' : 'EDIT EMPLOYEE'}">ADD EMPLOYEE</h2>

    <form th:action="@{/employees/save}" th:object="${employee}" method="post" enctype="multipart/form-data" style="border: 1px solid #ccc; padding: 20px;">

        <input type="hidden" th:field="*{id}" />
        <input type="hidden" th:field="*{avatar}" /> <div style="margin-bottom: 10px;">
        <label>FullName:</label><br>
        <input type="text" th:field="*{fullName}" style="width: 100%;" placeholder="Nhập fullName ..."/>
        <span class="error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></span> </div>

        <div style="margin-bottom: 10px;">
            <label>Position:</label><br>
            <input type="text" th:field="*{position}" style="width: 100%;" placeholder="Nhập position ..."/>
            <span class="error" th:if="${#fields.hasErrors('position')}" th:errors="*{position}"></span> </div>

        <div style="margin-bottom: 10px;">
            <label>Salary:</label><br>
            <input type="number" step="0.1" th:field="*{salary}" style="width: 100%;" placeholder="Nhập salary ..."/>
            <span class="error" th:if="${#fields.hasErrors('salary')}" th:errors="*{salary}"></span> </div>

        <div style="margin-bottom: 10px;">
            <label>Avatar:</label><br>
            <input type="file" name="file" accept=".jpg,.png" style="width: 100%;"/> </div>

        <div style="text-align: center; margin-top: 20px;">
            <button type="submit" style="width: 100%; padding: 10px; background-color: #d4edda; border: 1px solid #c3e6cb;">Submit</button>
        </div>
    </form>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
